# Fly.io config for travl-frontend
# Deploy from monorepo root with: flyctl deploy -c fly.travl-frontend.toml

app = "travl-frontend"
primary_region = "fra"

[build]
  dockerfile = "apps/travl-frontend/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  NODE_ENV = "production"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
